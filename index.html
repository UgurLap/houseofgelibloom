<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House of GELIBLOOM</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="nav">
  <div class="logo">GELIBLOOM</div>

  <div class="links">
    <a onclick="go('shop')">Shop</a>
    <a onclick="go('admin')">Admin</a>
    <a onclick="openCart()">Cart (<span id="cartCount">0</span>)</a>
  </div>
</nav>

<main id="app"></main>

<!-- CART -->
<div id="cart" class="modal">
  <div class="box">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <h3>Total: $<span id="total">0</span></h3>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<script>
/* =========================
   FAKE BACKEND (NEW V16 CORE)
========================= */

const DB = {
async getProducts(){
return new Promise(res=>{
setTimeout(()=>{
res(JSON.parse(localStorage.getItem("products")) || [
{id:1,name:"Turkish Towel",price:39,img:"https://images.unsplash.com/photo-1520975922284-9c9b4b3b8a3b?w=800"},
{id:2,name:"Beach Set",price:59,img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=800"},
{id:3,name:"Spa Robe",price:89,img:"https://images.unsplash.com/photo-1501117716987-c8e1ecb2101e?w=800"}
]);
},800); // loading simulation
});
},

async saveProducts(data){
localStorage.setItem("products",JSON.stringify(data));
}
};

/* =========================
   GLOBAL STORE (V16 CORE)
========================= */

const Store = {
state:{
page:"shop",
loading:false,
products:[],
cart: JSON.parse(localStorage.getItem("cart")) || []
},

setState(newState){
this.state = {...this.state,...newState};
render();
updateCart();
}
};

/* =========================
   INIT APP
========================= */

async function init(){
Store.setState({loading:true});

const products = await DB.getProducts();

Store.setState({
products,
loading:false
});
}

/* =========================
   ROUTER
========================= */

function go(page){
Store.setState({page});
}

/* =========================
   RENDER ENGINE
========================= */

function render(){

const s = Store.state;

if(s.loading){
document.getElementById("app").innerHTML = `
<div class="loading">Loading GELIBLOOM...</div>`;
return;
}

if(s.page==="shop") renderShop();
if(s.page==="admin") renderAdmin();
}

/* =========================
   SHOP UI
========================= */

function renderShop(){

const s = Store.state;

document.getElementById("app").innerHTML = `
<section class="hero">
  <div>
    <h1>Mediterranean Luxury</h1>
    <p>Crafted in Türkiye</p>
  </div>
</section>

<section class="shop">
  <h2>Collection</h2>

  <div class="grid">
    ${s.products.map(p=>`
      <div class="product">
        <div class="img" style="background-image:url('${p.img}')"></div>
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="addToCart(${p.id})">Add</button>
      </div>
    `).join("")}
  </div>
</section>
`;
}

/* =========================
   ADMIN (REAL APP STYLE)
========================= */

function renderAdmin(){

document.getElementById("app").innerHTML=`
<section class="admin">

<h1>Admin Panel</h1>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">

<button onclick="addProduct()">Create Product</button>

<h3>Products</h3>

${Store.state.products.map(p=>`
<div class="admin-item">
${p.name} - $${p.price}
<button onclick="deleteProduct(${p.id})">Remove</button>
</div>
`).join("")}

</section>
`;
}

/* =========================
   CRUD OPERATIONS
========================= */

async function addProduct(){

const newP = {
id:Date.now(),
name:document.getElementById("name").value,
price:Number(document.getElementById("price").value),
img:document.getElementById("img").value
};

const updated = [...Store.state.products,newP];

Store.setState({products:updated});

await DB.saveProducts(updated);
}

async function deleteProduct(id){

const updated = Store.state.products.filter(p=>p.id!==id);

Store.setState({products:updated});

await DB.saveProducts(updated);
}

/* =========================
   CART ENGINE
========================= */

function addToCart(id){

const p = Store.state.products.find(x=>x.id===id);

const cart = [...Store.state.cart];

const ex = cart.find(i=>i.id===id);

if(ex) ex.qty++;
else cart.push({...p,qty:1});

localStorage.setItem("cart",JSON.stringify(cart));

Store.setState({cart});
}

/* =========================
   CART UI
========================= */

function updateCart(){

let total=0;
let count=0;

let html="";

Store.state.cart.forEach(i=>{
count+=i.qty;
total+=i.price*i.qty;

html+=`
<div class="cart-item">
<span>${i.name}</span>
<span>${i.qty} x $${i.price}</span>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("cartCount").innerText=count;
}

/* =========================
   CART MODAL
========================= */

function openCart(){
updateCart();
document.getElementById("cart").style.display="flex";
}

function closeCart(){
document.getElementById("cart").style.display="none";
}

/* INIT */
init();
</script>

</body>
</html>
