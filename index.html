<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House of GELIBLOOM</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">GELIBLOOM</div>

  <div class="links">
    <a onclick="navigate('shop')">Shop</a>
    <a onclick="navigate('admin')">Admin</a>
    <a onclick="openCart()">Cart (<span id="cartCount">0</span>)</a>
  </div>
</nav>

<!-- APP -->
<main id="app"></main>

<!-- CART -->
<div id="cart" class="modal">
  <div class="box">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <h3>Total: $<span id="total">0</span></h3>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<script>
/* =========================
   FAKE API LAYER (NEW CORE)
========================= */

const API = {
  async getProducts(){
    return new Promise(res=>{
      setTimeout(()=>{
        res(JSON.parse(localStorage.getItem("products")) || [
          {id:1,name:"Turkish Towel",price:39,img:"https://images.unsplash.com/photo-1520975922284-9c9b4b3b8a3b?w=800"},
          {id:2,name:"Beach Set",price:59,img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=800"},
          {id:3,name:"Spa Robe",price:89,img:"https://images.unsplash.com/photo-1501117716987-c8e1ecb2101e?w=800"}
        ]);
      },500);
    });
  },

  async saveProducts(data){
    localStorage.setItem("products",JSON.stringify(data));
  }
};

/* =========================
   STATE MANAGER
========================= */

let state = {
page:"shop",
products:[],
cart:JSON.parse(localStorage.getItem("cart"))||[],
user:{logged:false}
};

/* =========================
   INIT
========================= */

async function init(){
state.products = await API.getProducts();
render();
updateCart();
}

/* =========================
   ROUTER
========================= */

function navigate(page){
state.page=page;
render();
}

/* =========================
   RENDER SYSTEM
========================= */

function render(){
if(state.page==="shop") renderShop();
if(state.page==="admin") renderAdmin();
}

/* =========================
   SHOP PAGE
========================= */

function renderShop(){

document.getElementById("app").innerHTML = `
<section class="hero">
  <div>
    <h1>Mediterranean Luxury</h1>
    <p>Crafted in Türkiye</p>
  </div>
</section>

<section class="shop">
  <h2>Products</h2>

  <div class="grid">
    ${state.products.map(p=>`
      <div class="product">
        <div class="img" style="background-image:url('${p.img}')"></div>
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="addToCart(${p.id})">Add</button>
      </div>
    `).join("")}
  </div>
</section>
`;
}

/* =========================
   ADMIN (LOGIN MOCK + CRUD)
========================= */

function renderAdmin(){

if(!state.user.logged){
document.getElementById("app").innerHTML=`
<section class="admin">
  <h1>Admin Login</h1>
  <input id="pass" placeholder="Enter password">
  <button onclick="login()">Login</button>
</section>`;
return;
}

document.getElementById("app").innerHTML=`
<section class="admin">

<h1>Product Admin</h1>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

<h3>Products</h3>

${state.products.map(p=>`
  <div class="admin-item">
    ${p.name} - $${p.price}
    <button onclick="deleteProduct(${p.id})">Delete</button>
  </div>
`).join("")}

</section>
`;
}

/* =========================
   AUTH
========================= */

function login(){
const pass=document.getElementById("pass").value;

if(pass==="1234"){
state.user.logged=true;
render();
}else{
alert("Wrong password");
}
}

/* =========================
   CRUD
========================= */

function addProduct(){
const p={
id:Date.now(),
name:document.getElementById("name").value,
price:Number(document.getElementById("price").value),
img:document.getElementById("img").value
};

state.products.push(p);
API.saveProducts(state.products);
render();
}

function deleteProduct(id){
state.products=state.products.filter(p=>p.id!==id);
API.saveProducts(state.products);
render();
}

/* =========================
   CART SYSTEM
========================= */

function addToCart(id){
const p=state.products.find(x=>x.id===id);

const ex=state.cart.find(i=>i.id===id);

if(ex) ex.qty++;
else state.cart.push({...p,qty:1});

saveCart();
updateCart();
}

function updateCart(){
let total=0;
let count=0;

let html="";

state.cart.forEach(i=>{
count+=i.qty;
total+=i.price*i.qty;

html+=`
<div class="cart-item">
<span>${i.name}</span>
<span>${i.qty} x $${i.price}</span>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("cartCount").innerText=count;
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(state.cart));
}

/* =========================
   CART UI
========================= */

function openCart(){
updateCart();
document.getElementById("cart").style.display="flex";
}

function closeCart(){
document.getElementById("cart").style.display="none";
}

/* INIT */
init();
</script>

</body>
</html>
