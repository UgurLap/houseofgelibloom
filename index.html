<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House of GELIBLOOM</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">GELIBLOOM</div>
  <div class="links">
    <a href="#shop">Shop</a>
    <a href="#story">Story</a>
    <a onclick="openCart()">Cart (<span id="cartCount">0</span>)</a>
  </div>
</nav>

<!-- HERO -->
<header class="hero">
  <video autoplay muted loop playsinline class="hero-video">
    <source src="https://cdn.pixabay.com/video/2023/08/16/177245-855219293_large.mp4">
  </video>

  <div class="hero-overlay"></div>

  <div class="hero-content">
    <h1>Mediterranean Luxury</h1>
    <p>Crafted in Türkiye for timeless living</p>
    <a href="#shop" class="btn">Explore</a>
  </div>
</header>

<!-- SHOP (rendered by JS) -->
<section id="shop" class="shop">
  <h2>Signature Collection</h2>
  <div id="grid" class="grid"></div>
</section>

<!-- STORY -->
<section id="story" class="story">
  <div>
    <h2>Quiet Luxury</h2>
    <p>
      GELIBLOOM is a modern interpretation of Mediterranean craftsmanship.
      Designed for timeless simplicity and texture.
    </p>
  </div>

  <div class="story-img"></div>
</section>

<!-- CART -->
<div id="cart" class="modal">
  <div class="box">

    <h2>Your Cart</h2>
    <div id="cartItems"></div>

    <h3>Total: $<span id="total">0</span></h3>

    <button onclick="checkout()">Checkout</button>
    <button onclick="closeCart()">Close</button>

  </div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="modal">
  <div class="box">

    <h2>Secure Checkout</h2>

    <input placeholder="Full Name">
    <input placeholder="Address">
    <input placeholder="Card Number">

    <button>Pay Now</button>
    <button onclick="closeCheckout()">Back</button>

  </div>
</div>

<script>
/* =========================
   PRODUCT DATABASE (NEW CORE)
========================= */

const products = [
{
id:1,
name:"Turkish Towel",
price:39,
img:"https://images.unsplash.com/photo-1520975922284-9c9b4b3b8a3b?w=800",
desc:"Ultra-soft Turkish cotton towel. Lightweight luxury."
},
{
id:2,
name:"Beach Set",
price:59,
img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=800",
desc:"Mediterranean beach essential set."
},
{
id:3,
name:"Spa Robe",
price:89,
img:"https://images.unsplash.com/photo-1501117716987-c8e1ecb2101e?w=800",
desc:"Hotel-grade spa comfort robe."
}
];

/* =========================
   CART ENGINE (UPGRADED)
========================= */

let cart = [];

function addToCart(id){

const product = products.find(p => p.id === id);
const existing = cart.find(i => i.id === id);

if(existing){
existing.qty++;
} else {
cart.push({...product, qty:1});
}

renderCart();
}

/* =========================
   RENDER PRODUCTS (NEW)
========================= */

function renderProducts(){
const grid = document.getElementById("grid");

grid.innerHTML = products.map(p => `
  <div class="product">
    <div class="img" style="background-image:url('${p.img}')"></div>
    <h3>${p.name}</h3>
    <p>$${p.price}</p>
    <button onclick="addToCart(${p.id})">Add to Cart</button>
  </div>
`).join("");
}

/* =========================
   CART RENDER
========================= */

function renderCart(){

let total = 0;

const html = cart.map((item, i) => {
total += item.price * item.qty;

return `
<div class="cart-item">
  <span>${item.name}</span>
  <span>$${item.price} x ${item.qty}</span>
</div>
`;
}).join("");

document.getElementById("cartItems").innerHTML = html;
document.getElementById("total").innerText = total;
document.getElementById("cartCount").innerText = cart.reduce((a,b)=>a+b.qty,0);
}

/* =========================
   UI ACTIONS
========================= */

function openCart(){
renderCart();
document.getElementById("cart").style.display="flex";
}

function closeCart(){
document.getElementById("cart").style.display="none";
}

function checkout(){
document.getElementById("checkout").style.display="flex";
document.getElementById("cart").style.display="none";
}

function closeCheckout(){
document.getElementById("checkout").style.display="none";
}

/* INIT */
renderProducts();
</script>

</body>
</html>
