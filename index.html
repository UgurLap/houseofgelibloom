<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House of GELIBLOOM</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">GELIBLOOM</div>

  <div class="links">
    <a href="#shop">Shop</a>
    <a href="#story">Story</a>
    <a onclick="openCart()">Cart (<span id="cartCount">0</span>)</a>
  </div>
</nav>

<!-- ROUTE VIEW (NEW CORE IDEA) -->
<main id="app"></main>

<!-- CART -->
<div id="cart" class="modal">
  <div class="box">

    <h2>Your Cart</h2>
    <div id="cartItems"></div>

    <h3>Total: $<span id="total">0</span></h3>

    <button onclick="checkout()">Checkout</button>
    <button onclick="closeCart()">Close</button>

  </div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="modal">
  <div class="box">

    <h2>Secure Checkout</h2>

    <input placeholder="Full Name">
    <input placeholder="Address">
    <input placeholder="Card Number">

    <button>Pay Now</button>
    <button onclick="closeCheckout()">Back</button>

  </div>
</div>

<script>
/* =========================
   STATE (mini framework core)
========================= */

let state = {
cart: JSON.parse(localStorage.getItem("cart")) || []
};

/* =========================
   PRODUCT DATABASE
========================= */

const products = [
{
id:1,
name:"Turkish Towel",
price:39,
img:"https://images.unsplash.com/photo-1520975922284-9c9b4b3b8a3b?w=800",
desc:"Ultra-soft Turkish cotton towel."
},
{
id:2,
name:"Beach Set",
price:59,
img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=800",
desc:"Mediterranean beach essential set."
},
{
id:3,
name:"Spa Robe",
price:89,
img:"https://images.unsplash.com/photo-1501117716987-c8e1ecb2101e?w=800",
desc:"Hotel-grade spa comfort robe."
}
];

/* =========================
   ROUTER (NEW)
========================= */

function router(){
const hash = location.hash.replace("#","");

if(hash.startsWith("product/")){
const id = parseInt(hash.split("/")[1]);
return renderProductPage(id);
}

return renderHome();
}

window.addEventListener("hashchange", router);

/* =========================
   COMPONENTS
========================= */

function renderHome(){
document.getElementById("app").innerHTML = `
<section class="hero">
  <div class="hero-content">
    <h1>Mediterranean Luxury</h1>
    <p>Crafted in Türkiye for timeless living</p>
    <a href="#shop" class="btn">Explore</a>
  </div>
</section>

<section class="shop">
  <h2>Signature Collection</h2>

  <div class="grid">
    ${products.map(p => `
      <div class="product">
        <div class="img" style="background-image:url('${p.img}')"></div>
        <h3>${p.name}</h3>
        <p>$${p.price}</p>

        <button onclick="location.hash='product/${p.id}'">View</button>
        <button onclick="addToCart(${p.id})">Add</button>
      </div>
    `).join("")}
  </div>
</section>
`;
}

/* PRODUCT PAGE (NEW MAJOR FEATURE) */

function renderProductPage(id){
const p = products.find(x=>x.id===id);

document.getElementById("app").innerHTML = `
<section class="product-page">

  <div class="product-hero" style="background-image:url('${p.img}')"></div>

  <div class="product-info">
    <h1>${p.name}</h1>
    <p>${p.desc}</p>
    <h2>$${p.price}</h2>

    <button onclick="addToCart(${p.id})">Add to Cart</button>
    <button onclick="location.hash=''">Back</button>
  </div>

</section>
`;
}

/* =========================
   CART SYSTEM (persisted)
========================= */

function addToCart(id){

const product = products.find(p => p.id === id);
const existing = state.cart.find(i => i.id === id);

if(existing){
existing.qty++;
} else {
state.cart.push({...product, qty:1});
}

saveCart();
updateCartUI();
}

function saveCart(){
localStorage.setItem("cart", JSON.stringify(state.cart));
}

/* =========================
   CART UI
========================= */

function updateCartUI(){

let count = 0;
let total = 0;

let html = "";

state.cart.forEach((item,i)=>{
count += item.qty;
total += item.price * item.qty;

html += `
<div class="cart-item">
  <span>${item.name}</span>
  <span>${item.qty} x $${item.price}</span>
</div>
`;
});

document.getElementById("cartItems").innerHTML = html;
document.getElementById("cartCount").innerText = count;
document.getElementById("total").innerText = total;
}

function openCart(){
updateCartUI();
document.getElementById("cart").style.display="flex";
}

function closeCart(){
document.getElementById("cart").style.display="none";
}

function checkout(){
document.getElementById("checkout").style.display="flex";
document.getElementById("cart").style.display="none";
}

function closeCheckout(){
document.getElementById("checkout").style.display="none";
}

/* INIT */
router();
updateCartUI();
</script>

</body>
</html>
