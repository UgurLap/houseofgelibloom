<!-- STORY -->
<section id="story" class="story">
  <div>
    <h2>Quiet Luxury</h2>
    <p>GELIBLOOM is a lifestyle rooted in Mediterranean calm and textile heritage.</p>
  </div>
  <div class="story-img"></div>
</section>

<!-- CART -->
<div id="cart" class="modal">
  <div class="box">
    <h2>Your Cart</h2>

    <div id="cartItems"></div>

    <h3>Total: $<span id="total">0</span></h3>

    <button onclick="openCheckout()">Checkout</button>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div id="productModal" class="modal">
  <div class="box">
    <h2 id="pTitle"></h2>
    <p id="pDesc"></p>
    <h3>$<span id="pPrice"></span></h3>

    <button onclick="addFromModal()">Add to Cart</button>
    <button onclick="closeProduct()">Close</button>
  </div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="modal">
  <div class="box">
    <h2>Checkout</h2>
    <p>Enter your details</p>

    <input placeholder="Full Name">
    <input placeholder="Address">

    <button>Pay Securely</button>
    <button onclick="closeCheckout()">Back</button>
  </div>
</div>

<script>
let cart = [];
let total = 0;
let selectedProduct = null;

function addToCart(name, price){
cart.push({name,price});
total += price;
document.getElementById("cartCount").innerText = cart.length;
}

function openCart(){
renderCart();
document.getElementById("cart").style.display="flex";
}

function renderCart(){
let html="";
cart.forEach((item,i)=>{
html += `<p>${item.name} - $${item.price}</p>`;
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

function closeCart(){
document.getElementById("cart").style.display="none";
}

function openProduct(title,price,desc){
selectedProduct = {title,price,desc};

document.getElementById("pTitle").innerText=title;
document.getElementById("pPrice").innerText=price;
document.getElementById("pDesc").innerText=desc;

document.getElementById("productModal").style.display="flex";
}

function addFromModal(){
addToCart(selectedProduct.title, selectedProduct.price);
closeProduct();
}

function closeProduct(){
document.getElementById("productModal").style.display="none";
}

function openCheckout(){
document.getElementById("checkout").style.display="flex";
document.getElementById("cart").style.display="none";
}

function closeCheckout(){
document.getElementById("checkout").style.display="none";
}
</script>

</body>
</html>
