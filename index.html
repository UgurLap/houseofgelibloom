<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House of GELIBLOOM</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">GELIBLOOM</div>

  <div class="links">
    <a onclick="navigate('home')">Shop</a>
    <a onclick="navigate('admin')">Admin</a>
    <a onclick="openCart()">Cart (<span id="cartCount">0</span>)</a>
  </div>
</nav>

<!-- APP ROOT -->
<main id="app"></main>

<!-- CART MODAL -->
<div id="cart" class="modal">
  <div class="box">

    <h2>Your Cart</h2>
    <div id="cartItems"></div>

    <h3>Total: $<span id="total">0</span></h3>

    <button onclick="closeCart()">Close</button>

  </div>
</div>

<script>
/* =========================
   STATE (mini store engine)
========================= */

let store = {
products: JSON.parse(localStorage.getItem("products")) || [
  {id:1,name:"Turkish Towel",price:39,img:"https://images.unsplash.com/photo-1520975922284-9c9b4b3b8a3b?w=800"},
  {id:2,name:"Beach Set",price:59,img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=800"},
  {id:3,name:"Spa Robe",price:89,img:"https://images.unsplash.com/photo-1501117716987-c8e1ecb2101e?w=800"}
],

cart: JSON.parse(localStorage.getItem("cart")) || [],

page:"home"
};

/* =========================
   RENDER ENGINE
========================= */

function render(){
if(store.page==="home") renderHome();
if(store.page==="admin") renderAdmin();
}

/* HOME PAGE */
function renderHome(){
document.getElementById("app").innerHTML = `
<section class="hero">
  <div>
    <h1>Mediterranean Luxury</h1>
    <p>Crafted in Türkiye</p>
  </div>
</section>

<section class="shop">
  <h2>Products</h2>

  <div class="grid">
    ${store.products.map(p=>`
      <div class="product">
        <div class="img" style="background-image:url('${p.img}')"></div>
        <h3>${p.name}</h3>
        <p>$${p.price}</p>

        <button onclick="addToCart(${p.id})">Add</button>
      </div>
    `).join("")}
  </div>
</section>
`;
}

/* ADMIN PANEL (NEW BIG FEATURE) */
function renderAdmin(){
document.getElementById("app").innerHTML = `
<section class="admin">

  <h1>Admin Panel</h1>

  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">
  <input id="img" placeholder="Image URL">

  <button onclick="addProduct()">Add Product</button>

  <h3>Existing Products</h3>

  ${store.products.map(p=>`
    <div class="admin-item">
      ${p.name} - $${p.price}
      <button onclick="removeProduct(${p.id})">Delete</button>
    </div>
  `).join("")}

</section>
`;
}

/* =========================
   ADMIN ACTIONS
========================= */

function addProduct(){
const name = document.getElementById("name").value;
const price = Number(document.getElementById("price").value);
const img = document.getElementById("img").value;

const id = Date.now();

store.products.push({id,name,price,img});
save();
render();
}

function removeProduct(id){
store.products = store.products.filter(p=>p.id!==id);
save();
render();
}

/* =========================
   CART ENGINE
========================= */

function addToCart(id){
const p = store.products.find(x=>x.id===id);

const exist = store.cart.find(i=>i.id===id);

if(exist){
exist.qty++;
}else{
store.cart.push({...p,qty:1});
}

save();
updateCart();
}

function updateCart(){
let total=0;
let count=0;

let html="";

store.cart.forEach(i=>{
count+=i.qty;
total+=i.price*i.qty;

html+=`
<div class="cart-item">
  <span>${i.name}</span>
  <span>${i.qty} x $${i.price}</span>
</div>
`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("cartCount").innerText=count;
}

/* =========================
   NAVIGATION SYSTEM
========================= */

function navigate(page){
store.page=page;
render();
}

/* =========================
   CART UI
========================= */

function openCart(){
updateCart();
document.getElementById("cart").style.display="flex";
}

function closeCart(){
document.getElementById("cart").style.display="none";
}

/* =========================
   STORAGE ENGINE
========================= */

function save(){
localStorage.setItem("products",JSON.stringify(store.products));
localStorage.setItem("cart",JSON.stringify(store.cart));
}

/* INIT */
render();
updateCart();
</script>

</body>
</html>
