<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House of GELIBLOOM</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">GELIBLOOM</div>
  <div class="links">
    <a href="#shop">Shop</a>
    <a href="#story">Story</a>
    <a onclick="openCart()">Cart (<span id="cartCount">0</span>)</a>
  </div>
</nav>

<!-- HERO -->
<header class="hero">
  <video autoplay muted loop playsinline class="hero-video">
    <source src="https://cdn.pixabay.com/video/2023/08/16/177245-855219293_large.mp4">
  </video>

  <div class="hero-overlay"></div>

  <div class="hero-content">
    <h1>Mediterranean Luxury</h1>
    <p>Crafted in Türkiye for timeless living</p>
    <a href="#shop" class="btn">Explore</a>
  </div>
</header>

<!-- SHOP -->
<section id="shop" class="shop">

<h2>Signature Pieces</h2>

<div class="grid">

  <div class="product">
    <div class="img img1"></div>
    <h3>Turkish Towel</h3>
    <p>$39</p>
    <button onclick="addToCart('Turkish Towel',39)">Add</button>
  </div>

  <div class="product">
    <div class="img img2"></div>
    <h3>Beach Set</h3>
    <p>$59</p>
    <button onclick="addToCart('Beach Set',59)">Add</button>
  </div>

  <div class="product">
    <div class="img img3"></div>
    <h3>Spa Robe</h3>
    <p>$89</p>
    <button onclick="addToCart('Spa Robe',89)">Add</button>
  </div>

</div>

</section>

<!-- STORY -->
<section id="story" class="story">
  <div>
    <h2>Quiet Luxury</h2>
    <p>Minimal design, maximum comfort. Inspired by Mediterranean living.</p>
  </div>
  <div class="story-img"></div>
</section>

<!-- CART -->
<div id="cart" class="modal">
  <div class="box">

    <h2>Your Cart</h2>

    <div id="cartItems"></div>

    <h3>Total: $<span id="total">0</span></h3>

    <button onclick="openCheckout()">Checkout</button>
    <button onclick="closeCart()">Close</button>

  </div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="modal">
  <div class="box">

    <h2>Secure Checkout</h2>

    <input placeholder="Full Name">
    <input placeholder="Address">
    <input placeholder="Card Number">

    <button>Pay Now</button>
    <button onclick="closeCheckout()">Back</button>

  </div>
</div>

<script>
let cart = [];

function addToCart(name, price) {
  let existing = cart.find(i => i.name === name);

  if(existing){
    existing.qty += 1;
  } else {
    cart.push({name, price, qty:1});
  }

  updateCart();
}

function updateCart(){
  let count = 0;
  let total = 0;

  let html = "";

  cart.forEach((item, index) => {
    count += item.qty;
    total += item.price * item.qty;

    html += `
      <div class="cart-item">
        <p>${item.name}</p>
        <p>$${item.price} x ${item.qty}</p>
        <button onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("cartCount").innerText = count;
  document.getElementById("total").innerText = total;
}

function removeItem(i){
  cart.splice(i,1);
  updateCart();
}

function openCart(){
  updateCart();
  document.getElementById("cart").style.display="flex";
}

function closeCart(){
  document.getElementById("cart").style.display="none";
}

function openCheckout(){
  document.getElementById("checkout").style.display="flex";
  document.getElementById("cart").style.display="none";
}

function closeCheckout(){
  document.getElementById("checkout").style.display="none";
}
</script>

</body>
</html>
